<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=0.9, user-scalable=no">
    <title>DMT_LEARN - Nền tảng học tập và giảng dạy trực tuyến </title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg-body: #0a0a0c;
            --page-w: 320px;
            --page-h: 480px;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 1023px) {
            :root {
                --page-w: 360px;
                /* Tăng nhẹ Mobile cho cân đối */
                --page-h: 530px;
            }
        }

        @media (min-width: 1024px) {
            :root {
                --page-w: 520px;
                /* Kích thước to và sang trọng trên Desktop */
                --page-h: 780px;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }

        body {
            background: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
        }

        .table-surface {
            position: fixed;
            width: 300vw;
            height: 300vh;
            top: 50%;
            left: 50%;
            margin-left: -150vw;
            margin-top: -150vh;
            background:
                radial-gradient(circle at center, rgba(0, 0, 0, 0.1) 0%, rgba(0, 0, 0, 0.9) 100%),
                url('assets/background.png');
            background-size: cover;
            background-position: center;
            /* Đồng bộ góc chuẩn từ backup */
            transform: rotateX(60deg) translateZ(-500px);
            z-index: 0;
            filter: brightness(0.6) contrast(1.1);
        }

        .book-container {
            position: absolute;
            left: 50%;
            top: 50%;
            width: calc(var(--page-w) * 2);
            height: var(--page-h);
            z-index: 10;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            /* Thu nhỏ 0.85 khi nằm trên bàn để không gian thoáng hơn */
            transform: translate(-75%, -50%) rotateX(40deg) rotateZ(-20deg) translateZ(-100px) scale(0.85);
            cursor: pointer;
        }

        .book-container.picked-up {
            cursor: default;
            transform: translate(-75%, -50%) rotateX(5deg) rotateZ(0deg) translateZ(100px) scale(1.05);
        }

        .book-container.opened {
            transform: translate(-50%, -50%) rotateX(40deg) rotateZ(-20deg) translateZ(-100px) scale(0.85);
        }

        .book-container.at-back {
            transform: translate(-25%, -50%) rotateX(40deg) rotateZ(-20deg) translateZ(-100px) scale(0.85);
        }

        .book-container.picked-up.opened {
            transform: translate3d(-50%, -50%, 0) rotateX(0deg) rotateZ(0deg) scale(1.0);
        }

        .book-container.picked-up.at-back {
            transform: translate3d(-25%, -50%, 0) rotateX(0deg) rotateZ(0deg) scale(1.0);
        }

        @media (max-width: 1023px) {
            .book-container {
                width: calc(var(--page-w) * 2);
                height: var(--page-h);
                left: 50%;
                top: 50%;
                margin: 0;
                transform: translate(-75%, -50%) rotateX(15deg) rotateZ(-5deg) translateZ(0);
                transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .book-container.mobile-page-right {
                transform: translate(-75%, -50%) rotateX(15deg) rotateZ(-5deg) translateZ(0);
            }

            .book-container.mobile-page-left {
                transform: translate(-25%, -50%) rotateX(15deg) rotateZ(-5deg) translateZ(0);
            }

            .book-container.picked-up.mobile-page-right {
                transform: translate(-75%, -50%) rotateX(0deg) rotateZ(0deg) translateZ(120px) scale(1.05);
            }

            .book-container.picked-up.mobile-page-left {
                transform: translate(-25%, -50%) rotateX(0deg) rotateZ(0deg) translateZ(120px) scale(1.05);
            }

            .book-container.picked-up {
                transform: translate(-75%, -50%) rotateX(0deg) rotateZ(0deg) translateZ(120px) scale(1.05);
            }
        }

        .book-shadow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            filter: blur(30px);
            transition: all 0.8s ease;
            z-index: -1;
            transform: translateZ(-1px);
        }

        .picked-up .book-shadow {
            transform: translate(50px, 50px) translateZ(-20px);
            opacity: 0.2;
            filter: blur(50px);
        }

        .book {
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: transparent;
            position: relative;
        }

        .picked-up .book {
            pointer-events: auto;
            z-index: 100;
        }

        .book::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 8px;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            filter: blur(4px);
            z-index: 20;
            transform: translateX(-50%);
            pointer-events: none;
            display: none;
        }

        .book-container.opened .book::before,
        .book-container.at-back .book::before,
        .picked-up .book::before {
            display: none;
            /* Ẩn hoàn toàn nếp gấp giữa */
        }

        .page {
            background-color: #fff;
            color: #333;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 2px 8px 8px 2px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .page-content {
            padding: 0;
            /* Loại bỏ viền trắng để hình ảnh tràn lề */
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            pointer-events: none;
        }

        .page-content * {
            pointer-events: auto;
        }



        .page.--front-cover {
            padding: 0;
            background: #fff;
        }

        .page.--front-cover .page-content {
            padding: 0;
            background: #fff;
        }

        .page.--back-cover {
            padding: 0;
            background: #fff;
            color: #333;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .page.--back-cover .page-content {
            background: #fff;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-radius: 8px 2px 2px 8px;
        }

        .tag {
            display: inline-block;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 11px;
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            width: fit-content;
        }

        .controls {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 99999;
            /* Ưu tiên cao nhất */
            opacity: 0;
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (max-width: 1023px) {
            .controls {
                bottom: 30px;
                gap: 10px;
            }
        }

        .controls.visible {
            opacity: 1;
            pointer-events: auto;
            /* Chuẩn hóa pointer-events */
        }

        button {
            padding: 10px 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            /* Viền kính sáng hơn */
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            /* Thiết lập trong suốt dạng kính */
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            backdrop-filter: blur(15px);
            /* Hiệu ứng làm mờ xuyên thấu */
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }

        button:hover {
            /* Giữ nguyên phong cách trong suốt khi hover */
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        button:active {
            transform: scale(0.95);
        }

        @media (max-width: 1023px) {
            button {
                padding: 12px 20px;
                font-size: 11px;
            }
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .hint {
            position: absolute;
            width: 100%;
            bottom: -60px;
            /* Căn giữa dưới trang bìa trước (nằm ở nửa phải của container 2w) */
            left: 75%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-size: 13px;
            transition: all 0.5s ease;
            z-index: 5;
            pointer-events: none;
        }

        .opened .hint {
            left: 50%;
            /* Nằm giữa khi mở 2 trang */
        }

        .at-back .hint {
            left: 25%;
            /* Nằm giữa bìa sau */
        }

        @media (max-width: 1023px) {
            .hint {
                bottom: -40px;
                font-size: 12px;
                left: 75%;
            }

            .mobile-page-left .hint {
                left: 25%;
            }
        }
    </style>
</head>

<body id="body">

    <div class="table-surface"></div>

    <div class="book-container" id="container">
        <div class="hint" id="hint">Chạm vào sách để khám phá</div>
        <div class="book-shadow"></div>
        <div class="book" id="book">
            <!-- 1. Front Cover (Outside) -->
            <div class="page --front-cover" data-density="hard">
                <div class="page-content">
                    <img src="assets/trangbia.png" style="width: 100%; height: 100%; object-fit: cover;"
                        alt="Trang bìa">
                </div>
            </div>

            <!-- 2. Front Cover (Inside) - Trang 1 -->
            <div class="page" data-density="hard">
                <div class="page-content">
                    <img src="assets/trang1.png" style="width: 100%; height: 100%; object-fit: cover;" alt="Trang 1">
                </div>
            </div>

            <!-- 3. Page 1 Front - Trang 2 -->
            <div class="page">
                <div class="page-content">
                    <img src="assets/trang2.png" style="width: 100%; height: 100%; object-fit: cover;" alt="Trang 2">
                </div>
            </div>

            <!-- 4. Page 1 Back - Trang 3 -->
            <div class="page">
                <div class="page-content">
                    <img src="assets/trang3.png" style="width: 100%; height: 100%; object-fit: cover;" alt="Trang 3">
                </div>
            </div>

            <!-- 5. Back Cover (Inside) - Trang 4 -->
            <div class="page" data-density="hard">
                <div class="page-content">
                    <img src="assets/trang4.png" style="width: 100%; height: 100%; object-fit: cover;" alt="Trang 4">
                </div>
            </div>

            <!-- 6. Back Cover (Outside) -->
            <div class="page --back-cover" data-density="hard">
                <div class="page-content">
                    <img src="assets/Timeline.png" style="width: 100%; height: 100%; object-fit: cover;" alt="Bìa cuối">
                </div>
            </div>
        </div>
    </div>

    <div class="controls" id="controls">
        <button id="btnPrev">Quay lại</button>
        <button id="btnNext">Tiếp theo</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            let isPickedUp = false;
            let virtualPage = 0; // Theo dõi trang đơn lẻ trên Mobile
            const body = document.getElementById('body');
            const container = document.getElementById('container');
            const controls = document.getElementById('controls');
            const hint = document.getElementById('hint');
            const isMobile = () => window.innerWidth < 1024;

            let w = 520;
            let h = 780;
            if (window.innerWidth < 1024) {
                w = 360;
                h = 530;
            }

            const pageFlip = new St.PageFlip(document.getElementById('book'), {
                width: w,
                height: h,
                size: "stretch",
                minWidth: 320,
                maxWidth: 600,
                minHeight: 480,
                maxHeight: 800,
                drawShadow: false, // Tắt nếp gấp ở giữa trang
                showCover: true,
                usePortrait: false,
                autoSize: true,
                mobileScrollSupport: false,
                disableFlipByClick: true,
                flippingTime: 800,
                clickEventForward: true,
                useMouseEvents: true,
                showPageCorners: false,
                maxShadowOpacity: 0.5,
            });
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            function updateMobileShift() {
                if (!isMobile()) return;
                container.classList.remove('mobile-page-left', 'mobile-page-right');
                if (virtualPage % 2 === 0) {
                    container.classList.add('mobile-page-right');
                } else {
                    container.classList.add('mobile-page-left');
                }
            }

            pageFlip.on('flip', (e) => {
                const pageIndex = e.data;
                const totalPages = pageFlip.getPageCount();

                if (isMobile()) {
                    // Logic đồng bộ virtualPage khi lật
                    // Nếu lật lùi (pageIndex < virtualPage), ta thường muốn xem trang bên phải của cặp mới
                    if (pageIndex < virtualPage && pageIndex > 0 && pageIndex % 2 !== 0) {
                        virtualPage = pageIndex + 1;
                    } else {
                        virtualPage = pageIndex;
                    }
                    updateMobileShift();
                } else {
                    container.classList.remove('opened', 'at-back');
                    if (pageIndex === 0) {
                        // Spread default
                    } else if (pageIndex === totalPages - 1) {
                        container.classList.add('at-back');
                    } else {
                        container.classList.add('opened');
                    }
                }
            });

            let touchStartX = 0;
            let touchEndX = 0;
            container.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            container.addEventListener('touchend', (e) => {
                if (!isPickedUp) return;
                touchEndX = e.changedTouches[0].screenX;
                const swipeDistance = touchEndX - touchStartX;
                const threshold = 30;
                if (Math.abs(swipeDistance) > threshold) {
                    if (swipeDistance < 0) handleNext(e);
                    else handlePrev(e);
                }
            }, { passive: true });

            function handlePickUp(e) {
                if (!isPickedUp) {
                    if (e.cancelable) e.preventDefault();
                    e.stopPropagation();
                    isPickedUp = true;
                    container.classList.add('picked-up');
                    controls.classList.add('visible');
                    hint.style.opacity = '0';
                    setTimeout(() => {
                        pageFlip.update();
                        updateMobileShift();
                    }, 800);
                } else {
                    // Nếu đã nhấc sách lên rồi mà click vào trang bìa thì mới lật
                    const currentIndex = pageFlip.getCurrentPageIndex();
                    if (currentIndex === 0) {
                        pageFlip.flipNext();
                    }
                }
            }

            container.addEventListener('click', handlePickUp);
            container.addEventListener('touchstart', (e) => {
                if (!isPickedUp) handlePickUp(e);
            }, { passive: false });

            body.addEventListener('click', (e) => {
                if (isPickedUp && !container.contains(e.target) && !controls.contains(e.target)) {
                    isPickedUp = false;
                    container.classList.remove('picked-up');
                    controls.classList.remove('visible');
                    hint.style.opacity = '1';
                }
            });

            const nextBtn = document.getElementById('btnNext');
            const prevBtn = document.getElementById('btnPrev');

            function handleNext(e) {
                if (e && e.cancelable) e.preventDefault();
                if (e) e.stopPropagation();

                if (isMobile()) {
                    const totalPages = pageFlip.getPageCount();
                    if (virtualPage === 0 || (virtualPage % 2 === 0 && virtualPage < totalPages - 1)) {
                        pageFlip.flipNext();
                    } else if (virtualPage % 2 !== 0 && virtualPage < totalPages - 1) {
                        virtualPage++;
                        updateMobileShift();
                    }
                } else {
                    pageFlip.flipNext();
                }
            }

            function handlePrev(e) {
                if (e && e.cancelable) e.preventDefault();
                if (e) e.stopPropagation();

                if (isMobile()) {
                    if (virtualPage > 0) {
                        if (virtualPage % 2 === 0 && virtualPage > 0) {
                            // Nếu đang ở trang bên phải của cặp (số chẵn), chỉ cần lùi sang trang trái
                            virtualPage--;
                            updateMobileShift();
                        } else {
                            // Nếu đang ở trang bên trái của cặp (số lẻ) hoặc bìa đơn, lật về cặp trước
                            pageFlip.flipPrev();
                        }
                    }
                } else {
                    pageFlip.flipPrev();
                }
            }

            nextBtn.addEventListener('click', handleNext);
            nextBtn.addEventListener('touchstart', handleNext, { passive: false });
            prevBtn.addEventListener('click', handlePrev);
            prevBtn.addEventListener('touchstart', handlePrev, { passive: false });
        });
    </script>
</body>

</html>
